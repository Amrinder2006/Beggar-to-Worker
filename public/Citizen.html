<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Citizen Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<style>
body {
    background: #f4f6f9;
}

.main-card {
    background: white;
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 6px 25px rgba(0,0,0,0.08);
}

.section-title {
    font-weight: 600;
    border-bottom: 2px solid #0d6efd;
    margin-bottom: 20px;
    padding-bottom: 5px;
}

.upload-box {
    border: 2px dashed #ccc;
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    background: #fafafa;
}

.upload-box img {
    width: 100%;
    max-height: 150px;
    object-fit: contain;
}

.btn-upload {
    margin-top: 10px;
    width: 100%;
}

.form-control, .form-select {
    border-radius: 8px;
}

.submit-btn {
    padding: 10px 30px;
    border-radius: 8px;
    font-weight: 500;
}
</style>

<script>
function Prev(event, imgId){
    const file = event.target.files[0];
    if (file) {
        document.getElementById(imgId).src = URL.createObjectURL(file);
    }
}

$(document).ready(function () {
    let email = localStorage.getItem("activeuser");
    $("#Email").val(email);
});
</script>

</head>

<body>

<div class="container py-5">

<div class="main-card">

<h3 class="text-center mb-4 fw-bold">Citizen Profile</h3>

<form action="/Citizen-Profile" method="post" enctype="multipart/form-data">

<div class="row g-4">

<!-- Aadhar Upload -->
<div class="col-md-4">
    <div class="section-title">Aadhar Upload</div>

    <div class="upload-box mb-3">
        <img id="Adharfro">
        <label class="btn btn-outline-primary btn-upload">
            Upload Front
            <input type="file" name="froadhar" hidden onchange="Prev(event,'Adharfro')">
        </label>
    </div>

    <div class="upload-box">
        <img id="citizenAdharBack">
        <label class="btn btn-outline-primary btn-upload">
            Upload Back
            <input type="file" name="backadhar" hidden onchange="Prev(event,'citizenAdharBack')">
        </label>
    </div>
</div>

<!-- Form Fields -->
<div class="col-md-8">

<div class="section-title">Personal Information</div>

<div class="row g-3">
    <div class="col-md-6">
        <label class="form-label">Email</label>
        <input type="email" id="Email" name="Email" class="form-control" disabled>
    </div>

    <div class="col-md-6">
        <label class="form-label">Mobile</label>
        <input type="tel" name="Mob" class="form-control" required>
    </div>

    <div class="col-md-6">
        <label class="form-label">Name</label>
        <input type="text" name="Name" class="form-control" maxlength="20" required>
    </div>

    <div class="col-md-6">
        <label class="form-label">Aadhar Number</label>
        <input type="text" name="Adharno" class="form-control">
    </div>

    <div class="col-md-6">
        <label class="form-label">Father's Name</label>
        <input type="text" name="Fathername" class="form-control" required>
    </div>

    <div class="col-md-3">
        <label class="form-label">DOB</label>
        <input type="date" name="dob" class="form-control">
    </div>

    <div class="col-md-3">
        <label class="form-label">Gender</label>
        <select name="gen" class="form-select" required>
            <option disabled selected>Select</option>
            <option>Male</option>
            <option>Female</option>
        </select>
    </div>

    <div class="col-md-8">
        <label class="form-label">Address</label>
        <input type="text" name="Address" class="form-control" required>
    </div>

    <div class="col-md-4">
        <label class="form-label">City</label>
        <input type="text" name="city" class="form-control" required>
    </div>
</div>

</div>

</div>

<!-- Submit -->
<div class="text-center mt-4">
    <button type="submit" class="btn btn-primary submit-btn">
        Submit Profile
    </button>
</div>

</form>

</div>
</div>

</body>
</html>
