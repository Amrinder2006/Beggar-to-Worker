<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Citizens</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/angular.js/1.8.3/angular.min.js"></script>

  <style>
    body { background:#f5f7fa; }

    .card-custom {
      border:none;
      border-radius:12px;
      box-shadow:0 4px 15px rgba(0,0,0,0.1);
    }

    .table-card {
      background:white;
      border-radius:12px;
      padding:20px;
      box-shadow:0 4px 20px rgba(0,0,0,0.08);
    }

    table th {
      background:#0d6efd;
      color:white;
      text-align:center;
    }

    table td {
      text-align:center;
      vertical-align:middle;
    }

    tbody tr:hover {
      background:#f1f5ff;
    }

    a {
      text-decoration:none;
      font-weight:500;
    }
  </style>

  <script>
    var module = angular.module("usersModule", []);

    module.controller("usersController", function($scope,$http){

      $scope.jsonary=[];

      $scope.fetchCitizens=function(){
        $http.get("/fetchcitizens").then(function(res){
          $scope.jsonary=res.data;
        },function(error){
          alert(error);
        });
      }

    });
  </script>
</head>

<body ng-app="usersModule" ng-controller="usersController">

<div class="container py-4">

  <!-- Header -->
  <div class="card card-custom text-center bg-primary text-white p-3 mb-4">
    <h3 class="mb-0">All Citizens Records</h3>
  </div>

  <!-- Button -->
  <div class="text-center mb-4">
    <button class="btn btn-success px-4 py-2" ng-click="fetchCitizens()">
      Fetch Citizens
    </button>
  </div>

  <!-- Table -->
  <div class="table-card">
    <div class="table-responsive">
      <table class="table table-bordered table-hover align-middle">

        <thead>
          <tr>
            <th>#</th>
            <th>Email</th>
            <th>Name</th>
            <th>Mobile</th>
            <th>Father Name</th>
            <th>DOB</th>
            <th>Gender</th>
            <th>Address</th>
            <th>City</th>
            <th>Aadhar No</th>
            <th>Front Aadhar</th>
            <th>Back Aadhar</th>
          </tr>
        </thead>

        <tbody>
          <tr ng-repeat="obj in jsonary">
            <td>{{$index+1}}</td>
            <td>{{obj.Email}}</td>
            <td>{{obj.Name}}</td>
            <td>{{obj.Mob}}</td>
            <td>{{obj.Fathername}}</td>
            <td>{{obj.dob | date:'yyyy-MM-dd'}}</td>
            <td>{{obj.gender}}</td>
            <td>{{obj.Address}}</td>
            <td>{{obj.city}}</td>
            <td>{{obj.Adharno}}</td>

            <td>
              <a href="{{obj.froadhar}}" target="_blank">View</a>
            </td>

            <td>
              <a href="{{obj.backadhar}}" target="_blank">View</a>
            </td>
          </tr>
        </tbody>

      </table>
    </div>
  </div>

</div>

</body>
</html>
