<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Users</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/angular.js/1.8.3/angular.min.js"></script>

  <style>
    body { background:#f5f7fa; }

    .card-custom {
      border:none;
      border-radius:12px;
      box-shadow:0 4px 15px rgba(0,0,0,0.1);
    }

    .table-card {
      background:white;
      border-radius:12px;
      padding:20px;
      box-shadow:0 4px 20px rgba(0,0,0,0.08);
    }

    table th {
      background:#0d6efd;
      color:white;
      text-align:center;
    }

    table td { text-align:center; }

    .btn-action {
      border-radius:6px;
      font-size:14px;
      padding:6px 12px;
    }

    tbody tr:hover {
      background:#f1f5ff;
    }
  </style>

  <script>
    var module = angular.module("usersModule", []);
    module.controller("usersController", function($scope,$http){

      $scope.jsonary=[];

      $scope.fetchall=function(){
        $http.get("/angularfetchall").then(function(res){
          $scope.jsonary=res.data;
        },function(error){
          alert(error);
        });
      }

      $scope.onblock=function(email){
        $http.post("/onblock",{Email:email}).then(function(){
          alert("Blocked");
          $scope.fetchall();
        });
      }

      $scope.onresume=function(email){
        $http.post("/onresume",{Email:email}).then(function(){
          alert("Resumed");
          $scope.fetchall();
        });
      }

    });
  </script>
</head>

<body ng-app="usersModule" ng-controller="usersController">

<div class="container py-4">

  <!-- Header -->
  <div class="card card-custom text-center bg-primary text-white p-3 mb-4">
    <h3 class="mb-0">All Users Records</h3>
  </div>

  <!-- Button -->
  <div class="text-center mb-4">
    <button class="btn btn-success px-4 py-2" ng-click="fetchall()">
      Fetch All Records
    </button>
  </div>

  <!-- Table -->
  <div class="table-card">
    <div class="table-responsive">
      <table class="table table-bordered table-hover align-middle">

        <thead>
          <tr>
            <th>#</th>
            <th>Username</th>
            <th>Email</th>
            <th>Password</th>
            <th>User Type</th>
            <th>Status</th>
            <th>Operation</th>
          </tr>
        </thead>

        <tbody>
          <tr ng-repeat="obj in jsonary">
            <td>{{$index+1}}</td>
            <td>{{obj.username}}</td>
            <td>{{obj.emailid}}</td>
            <td>{{obj.password}}</td>
            <td>{{obj.usertype}}</td>

            <td>
              <span class="badge"
                ng-class="{'bg-success': obj.status=='active', 'bg-danger': obj.status!='active'}">
                {{obj.status}}
              </span>
            </td>

            <td>
              <button class="btn btn-success btn-action me-2"
                ng-click="onresume(obj.emailid)">
                Resume
              </button>

              <button class="btn btn-danger btn-action"
                ng-click="onblock(obj.emailid)">
                Block
              </button>
            </td>
          </tr>
        </tbody>

      </table>
    </div>
  </div>

</div>

</body>
</html>
