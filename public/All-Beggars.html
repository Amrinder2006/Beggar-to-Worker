<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Beggar Records</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/angular.js/1.8.3/angular.min.js"></script>

  <style>
    body {
      background: #f5f7fa;
    }

    .header-card {
      border: none;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .table-card {
      border: none;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 20px;
      background: white;
    }

    table th {
      background-color: #0d6efd;
      color: white;
      text-align: center;
      vertical-align: middle;
    }

    table td {
      vertical-align: middle;
      text-align: center;
    }

    .btn-fetch {
      padding: 10px 25px;
      font-weight: 500;
      border-radius: 8px;
    }

    tbody tr:hover {
      background-color: #f1f5ff;
      transition: 0.2s;
    }
  </style>

  <script>
    var module = angular.module("usersModule", []);

    module.controller("usersController", function($scope, $http) {
        $scope.jsonary = [];

        $scope.fetchbegall = function() {
            $http.get("/fetchbeg").then(function(res){
                $scope.jsonary = res.data;
            }, function(error){
                alert(error);
            });
        };
    });
  </script>
</head>

<body ng-app="usersModule" ng-controller="usersController">

<div class="container py-4">

  <!-- Header -->
  <div class="row mb-4">
    <div class="col-md-12">
      <div class="card header-card text-center bg-primary text-white p-3">
        <h3 class="mb-0">All Beggar Records</h3>
      </div>
    </div>
  </div>

  <!-- Button -->
  <div class="row mb-4">
    <div class="col-md-12 text-center">
      <button class="btn btn-success btn-fetch" ng-click="fetchbegall()">
        Fetch Records
      </button>
    </div>
  </div>

  <!-- Table -->
  <div class="row">
    <div class="col-md-12">
      <div class="table-card">
        <div class="table-responsive">
          <table class="table table-bordered table-hover align-middle">

            <thead>
              <tr>
                <th>#</th>
                <th>Email</th>
                <th>Name</th>
                <th>Age</th>
                <th>Gender</th>
                <th>Address</th>
                <th>City</th>
                <th>Type</th>
                <th>Contact</th>
                <th>ID Proof</th>
                <th>Proof No.</th>
                <th>Proof URL</th>
                <th>Self URL</th>
              </tr>
            </thead>

            <tbody>
              <tr ng-repeat="obj in jsonary">
                <td>{{$index+1}}</td>
                <td>{{obj.emailid}}</td>
                <td>{{obj.name}}</td>
                <td>{{obj.age}}</td>
                <td>{{obj.gender}}</td>
                <td>{{obj.address}}</td>
                <td>{{obj.city}}</td>
                <td>{{obj.type}}</td>
                <td>{{obj.contact}}</td>
                <td>{{obj.idproof}}</td>
                <td>{{obj.proofno}}</td>
                <td>
                  <a href="{{obj.proofurl}}" target="_blank">View</a>
                </td>
                <td>
                  <a href="{{obj.selfurl}}" target="_blank">View</a>
                </td>
              </tr>
            </tbody>

          </table>
        </div>
      </div>
    </div>
  </div>

</div>

</body>
</html>
