<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beggar Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

<style>
body {
    background: #f4f6f9;
}

.form-card {
    background: #fff;
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 6px 25px rgba(0,0,0,0.08);
}

.section-title {
    font-weight: 600;
    border-bottom: 2px solid #0d6efd;
    padding-bottom: 5px;
    margin-bottom: 20px;
}

.preview-box {
    border: 2px dashed #ccc;
    border-radius: 10px;
    padding: 10px;
    width: 120px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fafafa;
}

.preview-box img {
    max-width: 100%;
    max-height: 100%;
}

.btn-upload {
    margin-top: 8px;
    font-size: 14px;
}

.btn-main {
    padding: 10px 25px;
    border-radius: 8px;
    font-weight: 500;
}
</style>

<script>
function numonly(e){
    let n=e.key;
    let k=e.target.value;
    let sum=n+k;
    if(n=='+'||n=='-'||parseInt(sum)<1||parseInt(sum)>=100){
        e.preventDefault();
    }
}

function Prev(event, imgId){
    const file = event.target.files[0];
    if (file != null) {
        document.getElementById(imgId).src = URL.createObjectURL(file);
    }
}

$(document).ready(function () {
    let email = localStorage.getItem("activeuser");
    $("#Email").val(email);
});
</script>

</head>

<body>

<div class="container py-5">
<div class="form-card">

<form method="post" enctype="multipart/form-data">

<h3 class="text-center mb-4 fw-bold">Beggar Registration</h3>

<!-- Email -->
<div class="mb-4">
    <label class="form-label fw-semibold">Email Address</label>
    <input type="text" id="Email" name="email" class="form-control" disabled>
</div>

<!-- Personal Details -->
<div class="section-title">Personal Details</div>

<div class="row g-3">
    <div class="col-md-4">
        <label class="form-label">Name</label>
        <input type="text" name="name" class="form-control" required>
    </div>

    <div class="col-md-4">
        <label class="form-label">Age</label>
        <input type="number" name="age" class="form-control" onkeydown="numonly(event)" required>
    </div>

    <div class="col-md-4">
        <label class="form-label">Gender</label><br>
        <div class="form-check form-check-inline">
            <input type="radio" name="gen" value="Male" class="form-check-input" required>
            <label class="form-check-label">Male</label>
        </div>
        <div class="form-check form-check-inline">
            <input type="radio" name="gen" value="Female" class="form-check-input">
            <label class="form-check-label">Female</label>
        </div>
    </div>
</div>

<div class="row g-3 mt-1">
    <div class="col-md-7">
        <label class="form-label">Address</label>
        <input type="text" name="address" class="form-control" required>
    </div>

    <div class="col-md-5">
        <label class="form-label">City</label>
        <input type="text" name="city" class="form-control" required>
    </div>
</div>

<!-- Work -->
<div class="section-title mt-4">Work Details</div>

<div class="row g-3">
    <div class="col-md-7">
        <label class="form-label">Type of Work</label><br>

        <div class="form-check form-check-inline">
            <input type="checkbox" name="type" value="Gardener" class="form-check-input">
            <label class="form-check-label">Gardener</label>
        </div>

        <div class="form-check form-check-inline">
            <input type="checkbox" name="type" value="Cleaner" class="form-check-input">
            <label class="form-check-label">Cleaner</label>
        </div>

        <div class="form-check form-check-inline">
            <input type="checkbox" name="type" value="Care-taker" class="form-check-input">
            <label class="form-check-label">Care-taker</label>
        </div>

        <div class="form-check form-check-inline">
            <input type="checkbox" name="type" value="Washer" class="form-check-input">
            <label class="form-check-label">Washer</label>
        </div>
    </div>

    <div class="col-md-5">
        <label class="form-label">Contact</label>
        <input type="number" name="contact" class="form-control" required>
    </div>
</div>

<!-- ID Proof -->
<div class="section-title mt-4">Verification</div>

<div class="row g-3">
    <div class="col-md-4">
        <label class="form-label">ID Proof</label>
        <select name="idproof" class="form-select" required>
            <option disabled selected>Select</option>
            <option value="Aadhar">Aadhar Card</option>
            <option value="PAN">PAN Card</option>
        </select>

        <label class="form-label mt-3">Proof Number</label>
        <input type="text" name="proofno" class="form-control" required>
    </div>

    <div class="col-md-4 text-center">
        <label class="form-label">Upload Proof</label>
        <div class="preview-box mx-auto">
            <img id="prevproof">
        </div>
        <label class="btn btn-outline-secondary btn-upload">
            Browse
            <input type="file" hidden onchange="Prev(event,'prevproof')">
        </label>
    </div>

    <div class="col-md-4 text-center">
        <label class="form-label">Upload Self</label>
        <div class="preview-box mx-auto">
            <img id="prevself">
        </div>
        <label class="btn btn-outline-secondary btn-upload">
            Browse
            <input type="file" hidden onchange="Prev(event,'prevself')">
        </label>
    </div>
</div>

<!-- Buttons -->
<div class="text-center mt-4">
    <input type="submit" class="btn btn-primary btn-main me-3"
           value="Submit" formaction="/begsubmit-process">

    <input type="submit" class="btn btn-warning btn-main"
           value="Update" formaction="/begupdate-process">
</div>

</form>
</div>
</div>

</body>
</html>
