<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volunteer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

<style>
body {
    background:#f4f6f9;
}

.form-card {
    background:white;
    border-radius:16px;
    padding:30px;
    box-shadow:0 6px 25px rgba(0,0,0,0.08);
}

.section-title {
    font-weight:600;
    border-bottom:2px solid #0d6efd;
    margin-bottom:20px;
    padding-bottom:5px;
}

.upload-box {
    border:2px dashed #ccc;
    border-radius:10px;
    padding:10px;
    background:#fafafa;
    text-align:center;
}

.upload-box img {
    width:100%;
    max-height:120px;
    object-fit:contain;
}

.btn-upload {
    margin-top:10px;
    width:100%;
}

.submit-btn {
    padding:10px 25px;
    border-radius:8px;
}
</style>

<script>
function Prev(event, imgId){
    const file = event.target.files[0];
    if(file){
        document.getElementById(imgId).src = URL.createObjectURL(file);
    }
}

function NGOreg(sel,lab,inp){
    let selected=sel.value;
    if(selected=="NGO"){
        document.getElementById(lab).innerHTML="NGO Registration Number";
        document.getElementById(inp).hidden=false;
        document.getElementById(inp).required=true;
    } else {
        document.getElementById(lab).innerHTML="";
        document.getElementById(inp).hidden=true;
        document.getElementById(inp).required=false;
    }
}

$(document).ready(function(){
    let email = localStorage.getItem("activeuser");
    $("#Email").val(email);
});
</script>

</head>

<body>

<div class="container py-5">
<div class="form-card">

<h3 class="text-center mb-4 fw-bold">Volunteer Registration</h3>

<form method="post" enctype="multipart/form-data">

<!-- Email -->
<div class="row g-3 mb-3">
    <div class="col-md-6">
        <label class="form-label">Email</label>
        <input type="email" id="Email" name="Email" class="form-control" disabled>
    </div>

    <div class="col-md-6 d-flex align-items-end">
        <button class="btn btn-outline-primary w-100">Fetch</button>
    </div>
</div>

<!-- Personal Info -->
<div class="section-title">Personal Information</div>

<div class="row g-3">
    <div class="col-md-6">
        <label class="form-label">Name</label>
        <input type="text" name="name" class="form-control" required>
    </div>

    <div class="col-md-6">
        <label class="form-label">Contact</label>
        <input type="text" name="contact" class="form-control" required>
    </div>

    <div class="col-md-6">
        <label class="form-label">Address</label>
        <input type="text" name="Address" class="form-control" required>
    </div>

    <div class="col-md-6">
        <label class="form-label">City</label>
        <input type="text" name="city" class="form-control" required>
    </div>

    <div class="col-md-6">
        <label class="form-label">Gender</label><br>
        <div class="form-check form-check-inline">
            <input type="radio" name="gen" value="Male" class="form-check-input" required>
            <label class="form-check-label">Male</label>
        </div>
        <div class="form-check form-check-inline">
            <input type="radio" name="gen" value="Female" class="form-check-input">
            <label class="form-check-label">Female</label>
        </div>
    </div>

    <div class="col-md-6">
        <label class="form-label">Occupation</label>
        <input type="text" name="occu" class="form-control" required>
    </div>
</div>

<!-- Volunteer Type -->
<div class="section-title mt-4">Volunteer Type</div>

<div class="row g-3">
    <div class="col-md-6">
        <label class="form-label">Type</label>
        <select name="type" class="form-select" onchange="NGOreg(this,'NGOL','NGO')" required>
            <option disabled selected>Select</option>
            <option value="Individual">Individual</option>
            <option value="NGO">NGO</option>
        </select>
    </div>

    <div class="col-md-6">
        <label class="form-label" id="NGOL"></label>
        <input type="text" id="NGO" name="NGO" class="form-control" hidden>
    </div>
</div>

<!-- Uploads -->
<div class="section-title mt-4">Documents</div>

<div class="row g-3 text-center">

    <div class="col-md-6">
        <div class="upload-box">
            <img id="prevadr">
        </div>
        <label class="btn btn-outline-secondary btn-upload">
            Upload Aadhar
            <input type="file" name="adhar" hidden onchange="Prev(event,'prevadr')">
        </label>
    </div>

    <div class="col-md-6">
        <div class="upload-box">
            <img id="prevprof">
        </div>
        <label class="btn btn-outline-secondary btn-upload">
            Upload Profile
            <input type="file" name="profile" hidden onchange="Prev(event,'prevprof')">
        </label>
    </div>

</div>

<!-- Buttons -->
<div class="text-center mt-4">
    <input type="submit" class="btn btn-primary submit-btn me-3" formaction="/submitcred" value="Submit">
    <input type="submit" class="btn btn-warning submit-btn" formaction="/updatecred" value="Update">
</div>

</form>

</div>
</div>

</body>
</html>
